<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <th:block th:replace="~{fragments/common-scripts-styles :: common-scripts-styles}"></th:block>
    <title th:text="#{error.AnErrorOccurred}"></title>
</head>
<body class="bg-light">

<div class="container vh-100 d-flex align-items-center justify-content-center">
    <div class="text-center col-12 col-md-8 col-lg-6">

        <h1 class="display-1 fw-bold text-secondary opacity-25">404</h1>

        <h2 th:text="#{error.SomethingWentWrong}" class="fw-bold mb-3"></h2>

        <p th:text="#{error.ResourceNotFound}" class="text-muted mb-5">
        </p>

        <div class="d-flex flex-column flex-sm-row justify-content-center gap-3">
            <a th:text="#{error.ReturnHome}" href="/" class="btn btn-dark rounded-pill px-5 py-2 shadow-sm">
            </a>
            <button th:text="#{error.GoBack}" onclick="history.back()" class="btn btn-outline-secondary rounded-pill px-5 py-2">
            </button>
        </div>
    </div>
</div>
</body>
</html>
