<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <title th:text="#{store.auth.Register}"></title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <th:block th:replace="~{fragments/common-scripts-styles :: common-scripts-styles}"></th:block>
    <script type="module" th:src="@{/js/validation/auth-validation.js}"></script>
    <script>
        const validationData = {
            fieldRequired: '[[#{store.validation.FieldRequired}]]',
            nameMinLength: '[[${validation.nameMinLength}]]',
            nameMaxLength: '[[${validation.nameMaxLength}]]',
            passwordMinLength: '[[${validation.passwordMinLength}]]',
            passwordMaxLength: '[[${validation.passwordMaxLength}]]',
            nameMinLengthMessage: '[[${validation.nameMinLengthMessage}]]',
            nameMaxLengthMessage: '[[${validation.nameMaxLengthMessage}]]',
            passwordMinLengthMessage: '[[${validation.passwordMinLengthMessage}]]',
            passwordMaxLengthMessage: '[[${validation.passwordMaxLengthMessage}]]',
            validEmailAddress: '[[#{store.validation.ValidEmailAddress}]]',
            matchingPasswords: '[[#{store.validation.MatchingPasswords}]]'
        }
    </script>
</head>
<body class="bg-light d-flex align-items-center justify-content-center min-vh-100 py-5">
<div class="container" style="max-width: 400px;">
    <div class="text-center mb-4">
        <h2 th:text="#{store.auth.CreateAccount}" class="fw-bold"></h2>
    </div>
    <div class="card shadow-sm border-0 p-4">
        <form th:action="@{/register}" id="registrationForm" class="validated-form" method="post">
            <div class="mb-3 form-group">
                <label th:text="#{store.auth.Name}" for="name" class="form-label text-muted small"></label>
                <input type="text" name="name" id="name" class="form-control required" autofocus>
                <div class="invalid-feedback error-field"></div>
            </div>
            <div class="mb-3 form-group">
                <label th:text="#{store.auth.Surname}" for="surname" class="form-label text-muted small"></label>
                <input type="text" name="surname" id="surname" class="form-control required" autofocus>
                <div class="invalid-feedback error-field"></div>
            </div>
            <div class="mb-3 form-group">
                <label th:text="#{store.auth.Email}" for="username" class="form-label text-muted small"></label>
                <input type="email" name="username" id="username" class="form-control required email" autofocus>
                <div class="invalid-feedback error-field"></div>
            </div>
            <div class="mb-3 form-group">
                <label th:text="#{store.auth.Password}" for="password" class="form-label text-muted small"></label>
                <input type="password" name="password" id="password" class="form-control required">
                <div class="invalid-feedback error-field"></div>
            </div>
            <div class="mb-4 form-group">
                <label th:text="#{store.auth.PasswordConfirmation}" for="passwordConfirmation" class="form-label text-muted small"></label>
                <input type="password" name="passwordConfirmation" id="passwordConfirmation" class="form-control required password-confirmation">
                <div class="invalid-feedback error-field"></div>
            </div>
            <button th:text="#{store.auth.Register}" type="submit" class="btn btn-dark w-100 py-2"></button>
        </form>
        <div class="text-center mt-3 small">
            <span th:text="#{store.auth.AlreadyHaveAnAccount}" class="text-muted"></span> <a th:text="#{store.auth.LoginHere}" th:href="@{/login}" class="text-decoration-none"></a>
        </div>
    </div>
    <div class="text-center mt-3">
        <a th:text="'&larr;' + #{store.nav.ReturnToStore}" th:href="@{/}" class="text-muted text-decoration-none small"></a>
    </div>
</div>
</body>
</html>
